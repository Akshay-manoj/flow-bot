services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flowbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    image: node:20-slim
    working_dir: /app/apps/api
    volumes:
      - .:/app
      - /app/apps/api/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@postgres:5432/flowbot
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local-dev-secret
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - CORS_ORIGINS=http://localhost:3001
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev --name init && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ui:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/dashboard/node_modules
      - /app/apps/widget/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter dashboard dev"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
