services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ui:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/dashboard/node_modules
      - /app/apps/widget/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter dashboard dev"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
