services:
  - type: web
    name: flowbot-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/main.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard → value from Neon
      - key: REDIS_URL
        sync: false   # Set manually in Render dashboard → value from Upstash
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random string
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3000
      - key: CORS_ORIGINS
        sync: false   # Set to your Vercel dashboard URL + Cloudflare Pages widget URL
